server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: bank-account-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bank_db?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:050130}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:bank}
    password: ${RABBITMQ_PASSWORD:bank123}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

bank:
  jwt:
    secret: ${JWT_SECRET:change-this-demo-secret-to-a-long-random-value}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:120}
  security:
    data-secret: ${BANK_DATA_SECRET:change-this-data-secret}
    login-max-failures: ${LOGIN_MAX_FAILURES:5}
    login-lock-minutes: ${LOGIN_LOCK_MINUTES:10}
    single-transfer-limit: ${SINGLE_TRANSFER_LIMIT:50000}
    daily-transfer-limit: ${DAILY_TRANSFER_LIMIT:100000}
    large-transfer-threshold: ${LARGE_TRANSFER_THRESHOLD:20000}
  agent:
    api-url: ${BANK_AGENT_API_URL:https://mcpa.nanzhi.space/v1}
    model: ${BANK_AGENT_MODEL:gpt-5.5}
    api-key: ${BANK_AGENT_API_KEY:}
  demo-data:
    enabled: ${BANK_DEMO_DATA_ENABLED:true}
  redis:
    enabled: ${BANK_REDIS_ENABLED:true}
  rabbit:
    enabled: ${BANK_RABBIT_ENABLED:true}
